---
- name: Iteration 8 - Chaotic Starvation Test
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Roll the dice for execution time and memory load
      set_fact:
        # Random execution time between 30 seconds and 300 seconds (5 minutes)
        exec_time: "{{ 300 | random(start=30, step=15) }}"
        
        # Random memory allocation between 256 MB and 1024 MB (1 GB)
        mem_load: "{{ 1024 | random(start=256, step=256) }}"

    - name: Log the randomized parameters for this specific job
      debug:
        msg: "INITIATING CHAOS: Job will run for {{ exec_time }} seconds consuming {{ mem_load }}MB of RAM."

    - name: Execute CPU Burn and Memory Hog simultaneously
      shell: |
        /usr/local/bin/cpuburn {{ exec_time }} &
        python3 /usr/local/bin/memhog.py {{ mem_load }} {{ exec_time }} &
        wait
      # Set async slightly higher than our max random time to prevent Ansible timeouts
      async: 330 
      poll: 10
