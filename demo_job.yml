---
- name: Iteration 9 - Realistic Production Chaos
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Roll the dice for realistic execution time and memory
      set_fact:
        # Random execution time between 30s and 300s (5 minutes)
        exec_time: "{{ 300 | random(start=30, step=15) }}"
        
        # Realistic memory load: 128MB to 512MB
        mem_load: "{{ 512 | random(start=128, step=64) }}"

    - name: Log the randomized parameters
      debug:
        msg: "REALISTIC CHAOS: Job will hold state for {{ exec_time }} seconds consuming {{ mem_load }}MB of RAM."

    - name: Simulate Ansible I/O Wait (Sleep) and Memory Hog
      shell: |
        # Hold memory in the background
        python3 /usr/local/bin/memhog.py {{ mem_load }} {{ exec_time }} &
        
        # Simulate waiting for remote hosts to execute tasks
        sleep {{ exec_time }}
        
        wait
      async: 330 
      poll: 10
